name: CI/CD Pipeline

# ============================================================
# TRIGGERS
# This pipeline runs whenever code is pushed to ANY branch,
# or when a pull request is opened.
# The deploy stage has its own check — it only runs on main.
# ============================================================
on:
  push:
    branches: ["*"]
  pull_request:

jobs:

# ============================================================
# STAGE 1: LINT
# Linting = checking code style and obvious errors WITHOUT
# running the code. Think of it as spell-check for code.
# If your code is messy or has obvious mistakes, stop here.
# ============================================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        # This clones your repo into the GitHub runner machine
        # so the pipeline can actually see your files.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint Python with flake8
        run: |
          pip install flake8
          # E501 = line too long — we ignore it, not critical
          # --max-line-length=120 gives reasonable breathing room
          flake8 api/ worker/ --max-line-length=120 --ignore=E501

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Lint JavaScript with ESLint
        run: |
          cd frontend
          npm ci
          npx eslint app.js
        # npm ci = clean install from lockfile (faster than npm install)
        # ESLint checks your JS for bad patterns and errors

      - name: Lint Dockerfiles with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
      
      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile


# ============================================================
# STAGE 2: TEST
# Runs unit tests on the API with Redis MOCKED.
# "Mocked" means we fake Redis — we don't need a real Redis
# instance running to test the API logic itself.
# "needs: lint" means this ONLY runs if lint passed.
# ============================================================
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          cd api
          pytest tests/ --cov=. --cov-report=xml --cov-report=term
        # --cov=.          → measure coverage of all files in api/
        # --cov-report=xml → saves coverage.xml (for upload)
        # --cov-report=term → prints coverage summary in the logs

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml
        # This saves coverage.xml so you can download and view
        # it from the GitHub Actions UI after the run.


# ============================================================
# STAGE 3: BUILD
# Build all three Docker images and push them to a LOCAL
# registry running inside the pipeline itself.
# Why local? The task says no paid services — no DockerHub push.
# A local registry is a Docker container that acts like DockerHub
# but runs inside the GitHub Actions job.
# ============================================================
  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
        # This spins up a local Docker registry on port 5000.
        # We push images to localhost:5000/imagename
        # Later stages pull from the same registry.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host
        # Buildx is Docker's modern build system.
        # network=host lets it reach the local registry on localhost:5000

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest
        # github.sha = the unique git commit hash (e.g. "a3f9c2b...")
        # Tagging with SHA means every build is uniquely traceable.
        # Tagging with "latest" means "this is the most recent build".

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest


# ============================================================
# STAGE 4: SECURITY SCAN
# Trivy scans your Docker images for known CVEs
# (Common Vulnerabilities and Exposures).
# If it finds anything CRITICAL severity, the pipeline fails.
# You don't want to deploy an image with a known critical exploit.
# ============================================================
  security:
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "localhost:5000/api:latest"
          format: "sarif"
          output: "trivy-api.sarif"
          severity: "CRITICAL"
          exit-code: "1"
        # format: sarif = standard security report format GitHub understands
        # exit-code: 1 = fail the pipeline if CRITICAL vulns are found

      - name: Scan worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "localhost:5000/worker:latest"
          format: "sarif"
          output: "trivy-worker.sarif"
          severity: "CRITICAL"
          exit-code: "1"

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "localhost:5000/frontend:latest"
          format: "sarif"
          output: "trivy-frontend.sarif"
          severity: "CRITICAL"
          exit-code: "1"

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        if: always()
        # if: always() → upload the report even if scan failed
        # You want to SEE what was found even when it fails
        with:
          name: trivy-results
          path: "*.sarif"


# ============================================================
# STAGE 5: INTEGRATION TEST
# This is the most realistic test — it spins up your ENTIRE
# stack inside the GitHub runner, submits a real job, waits
# for it to complete, and checks the result.
# This proves all four services work together end-to-end.
# ============================================================
  integration-test:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file for compose
        run: |
          echo "REDIS_PASSWORD=testpassword" >> .env
          echo "FRONTEND_PORT=3000" >> .env
        # We create a temporary .env just for this test run.
        # Never committed — only exists during the pipeline job.

      - name: Start full stack
        run: docker compose up --build -d
        # -d = detached mode (runs in background)

      - name: Wait for stack to be ready
        run: |
          echo "Waiting for frontend to be healthy..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "✅ Stack is ready"
              break
            fi
            echo "Attempt $i — not ready yet, waiting..."
            sleep 5
          done

      - name: Submit job and verify completion
        run: |
          # Submit a job through the frontend
          echo "Submitting job..."
          RESPONSE=$(curl -sf -X POST http://localhost:3000/submit)
          echo "Response: $RESPONSE"

          # Extract the job ID from the response
          JOB_ID=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"

          # Poll the status endpoint until the job completes
          echo "Polling for completion..."
          for i in $(seq 1 30); do
            STATUS=$(curl -sf http://localhost:3000/status/$JOB_ID | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "✅ Job completed successfully!"
              exit 0
            fi
            sleep 2
          done

          echo "❌ Job never completed within timeout"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v
        # if: always() → tear down even if the test above failed.
        # -v = also remove volumes (clean slate for next run)


# ============================================================
# STAGE 6: DEPLOY
# Only runs on pushes to the main branch.
# SSHes into your Oracle VPS and performs a rolling update —
# new container must pass health check before old one stops.
# ============================================================
  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    # This entire job is skipped unless you're pushing to main.
    # Feature branches run all other stages but never deploy.

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # These come from GitHub Secrets — never hardcoded.
          # Set them in: Repo → Settings → Secrets → Actions
          script: |
            cd ~/hng14-stage2-devops

            # Pull latest code
            git pull origin main

            # Build new images
            docker compose build

            # Rolling update for API:
            # 1. Start new container
            docker compose up -d --no-deps --scale api=2 api

            # 2. Wait up to 60s for new container to be healthy
            TIMEOUT=60
            ELAPSED=0
            while [ $ELAPSED -lt $TIMEOUT ]; do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q api | head -1))
              if [ "$STATUS" = "healthy" ]; then
                echo "✅ New container healthy"
                break
              fi
              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done

            if [ "$STATUS" != "healthy" ]; then
              echo "❌ Health check failed — aborting deploy, old container kept"
              docker compose up -d --no-deps --scale api=1 api
              exit 1
            fi

            # 3. Scale back down (removes old container)
            docker compose up -d --no-deps --scale api=1 api

            # Bring up any other changed services
            docker compose up -d --no-deps worker frontend