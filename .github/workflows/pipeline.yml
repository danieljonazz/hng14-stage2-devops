name: CI/CD Pipeline

on:
  push:
    branches: ["*"]
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Lint Python with flake8
        run: |
          pip install flake8
          flake8 api/ worker/ --max-line-length=120 --ignore=E501,E302,E305,W291,W292

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Lint JavaScript with ESLint
        run: |
          cd frontend
          npm ci
          npx eslint app.js --env node --env es6 --parser-options=ecmaVersion:2020

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run tests with coverage
        run: |
          cd api
          pytest tests/ --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest

  security:
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Rebuild API image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: localhost:5000/api:latest

      - name: Rebuild worker image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: localhost:5000/worker:latest

      - name: Rebuild frontend image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: localhost:5000/frontend:latest

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "localhost:5000/api:latest"
          format: "sarif"
          output: "trivy-api.sarif"
          severity: "CRITICAL"
          exit-code: "1"

      - name: Scan worker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "localhost:5000/worker:latest"
          format: "sarif"
          output: "trivy-worker.sarif"
          severity: "CRITICAL"
          exit-code: "1"

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "localhost:5000/frontend:latest"
          format: "sarif"
          output: "trivy-frontend.sarif"
          severity: "CRITICAL"
          exit-code: "1"

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: "*.sarif"

  integration-test:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "REDIS_PASSWORD=testpassword" >> .env
          echo "FRONTEND_PORT=3000" >> .env

      - name: Start full stack
        run: docker compose up --build -d

      - name: Wait for stack to be ready
        run: |
          echo "Waiting for frontend to be healthy..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "✅ Stack is ready"
              break
            fi
            echo "Attempt $i — not ready yet..."
            sleep 5
          done

      - name: Submit job and verify completion
        run: |
          echo "Submitting job..."
          RESPONSE=$(curl -sf -X POST http://localhost:3000/submit)
          echo "Response: $RESPONSE"
          JOB_ID=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"
          echo "Polling for completion..."
          for i in $(seq 1 30); do
            STATUS=$(curl -sf http://localhost:3000/status/$JOB_ID | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "✅ Job completed successfully!"
              exit 0
            fi
            sleep 2
          done
          echo "❌ Job never completed"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/hng14-stage2-devops
            git pull origin main
            docker compose build

            docker compose up -d --no-deps --scale api=2 api

            TIMEOUT=60
            ELAPSED=0
            STATUS=""
            while [ $ELAPSED -lt $TIMEOUT ]; do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q api | head -1))
              if [ "$STATUS" = "healthy" ]; then
                echo "✅ New container healthy"
                break
              fi
              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done

            if [ "$STATUS" != "healthy" ]; then
              echo "❌ Health check failed — keeping old container"
              docker compose up -d --no-deps --scale api=1 api
              exit 1
            fi

            docker compose up -d --no-deps --scale api=1 api
            docker compose up -d --no-deps worker frontend